<script>
        // Rotating status text logic
        const statuses = [
            "Referencing textbook material...",
            "Applying grading criteria...",
            "Formulating follow-up...",
            "Analyzing conceptual understanding..."
        ];
        
        const statusElement = document.getElementById('status-text');
        let currentIndex = 0;

        setInterval(() => {
            // Fade out
            statusElement.style.opacity = '0';
            
            setTimeout(() => {
                // Change text and fade in
                currentIndex = (currentIndex + 1) % statuses.length;
                statusElement.textContent = statuses[currentIndex];
                statusElement.style.opacity = '1';
            }, 500); // Wait for fade out to complete before changing text
            
        }, 3000); // Change status every 3 seconds
    </script>
